name: Update Download Page

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(gh release list --limit 1 -L 1 -q '.[0].tagName')
            if [[ -z "$TAG" ]]; then
              echo "No release found"
              exit 1
            fi
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          EXE_URL=""
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name')
          for name in $ASSETS; do
            if [[ "$name" == *.exe ]]; then
              EXE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${name}"
              break
            fi
          done
          echo "exe_url=$EXE_URL" >> $GITHUB_OUTPUT

      - name: Generate download page
        env:
          VERSION: ${{ steps.release.outputs.version }}
          EXE_URL: ${{ steps.release.outputs.exe_url }}
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>下载应用</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
                background: #0a0a0f;
                color: #e0e0e0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
              }
              .container {
                max-width: 520px;
                width: 100%;
                padding: 48px 32px;
              }
              .logo-area {
                text-align: center;
                margin-bottom: 48px;
              }
              .logo-area h1 {
                font-size: 28px;
                font-weight: 600;
                letter-spacing: 1px;
                background: linear-gradient(135deg, #60a5fa, #a78bfa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
              }
              .version {
                font-size: 13px;
                color: #555;
                margin-top: 6px;
                letter-spacing: 2px;
              }
              .proxy-box {
                background: rgba(255,255,255,0.03);
                border: 1px solid rgba(255,255,255,0.06);
                border-radius: 10px;
                padding: 14px 16px;
                margin-bottom: 28px;
                display: flex;
                align-items: center;
                gap: 12px;
                cursor: pointer;
                transition: border-color 0.2s;
              }
              .proxy-box:hover { border-color: rgba(255,255,255,0.12); }
              .toggle {
                position: relative;
                width: 40px;
                height: 22px;
                flex-shrink: 0;
              }
              .toggle input { display: none; }
              .toggle .slider {
                position: absolute;
                inset: 0;
                background: #2a2a35;
                border-radius: 11px;
                transition: 0.3s;
                cursor: pointer;
              }
              .toggle .slider::after {
                content: '';
                position: absolute;
                width: 16px;
                height: 16px;
                left: 3px;
                top: 3px;
                background: #666;
                border-radius: 50%;
                transition: 0.3s;
              }
              .toggle input:checked + .slider { background: #3b5bdb; }
              .toggle input:checked + .slider::after { transform: translateX(18px); background: #fff; }
              .proxy-text .proxy-title { font-size: 14px; color: #ccc; }
              .proxy-text .proxy-desc { font-size: 12px; color: #555; margin-top: 2px; }
              .dl-list { display: flex; flex-direction: column; gap: 12px; }
              .dl-item {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 16px 20px;
                background: rgba(255,255,255,0.03);
                border: 1px solid rgba(255,255,255,0.06);
                border-radius: 12px;
                text-decoration: none;
                color: #e0e0e0;
                transition: all 0.2s;
                position: relative;
              }
              .dl-item:not(.disabled):hover {
                background: rgba(59,91,219,0.08);
                border-color: rgba(59,91,219,0.3);
                transform: translateY(-1px);
              }
              .dl-item.disabled {
                opacity: 0.3;
                cursor: not-allowed;
                pointer-events: none;
              }
              .dl-item .icon {
                width: 36px;
                height: 36px;
                flex-shrink: 0;
              }
              .dl-item .icon svg { width: 100%; height: 100%; }
              .dl-item .info { flex: 1; }
              .dl-item .info .os-name { font-size: 15px; font-weight: 500; }
              .dl-item .info .os-desc { font-size: 12px; color: #666; margin-top: 2px; }
              .dl-item .arrow {
                font-size: 18px;
                color: #555;
                transition: color 0.2s;
              }
              .dl-item:not(.disabled):hover .arrow { color: #60a5fa; }
              .badge {
                font-size: 10px;
                padding: 2px 8px;
                border-radius: 4px;
                background: rgba(59,91,219,0.15);
                color: #60a5fa;
                margin-left: 8px;
                letter-spacing: 0.5px;
              }
              .badge.soon {
                background: rgba(255,255,255,0.05);
                color: #555;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="logo-area">
                <h1>Kifay AI</h1>
                <p class="version">__VERSION__</p>
              </div>

              <div class="proxy-box" onclick="document.getElementById('proxy').click()">
                <div class="toggle">
                  <input type="checkbox" id="proxy">
                  <div class="slider"></div>
                </div>
                <div class="proxy-text">
                  <div class="proxy-title">启用下载加速代理</div>
                  <div class="proxy-desc">解决 GitHub 下载慢 / 失败问题</div>
                </div>
              </div>

              <div class="dl-list">
                <a id="dl-windows" class="dl-item" href="__EXE_URL__" target="_blank" rel="noreferrer">
                  <div class="icon">
                    <svg viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
                      <path d="M0 12.402l35.687-4.86.016 34.423-35.67.203zm35.67 33.529l.028 34.453L.028 75.48.026 45.7zm4.326-39.025L87.314 0v41.527l-47.318.376zm47.329 39.349l-.011 41.34-47.318-6.678-.066-34.739z" fill="#0078d4"/>
                    </svg>
                  </div>
                  <div class="info">
                    <div class="os-name">Windows <span class="badge">64-bit</span></div>
                    <div class="os-desc">.exe 安装包</div>
                  </div>
                  <div class="arrow">→</div>
                </a>

                <div class="dl-item disabled">
                  <div class="icon">
                    <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
                      <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.8-82-107.3-210-107.3-332 0-191 124.3-292.3 246.8-292.3 65.2 0 119.4 42.8 160.1 42.8 38.9 0 99.7-45.4 174-45.4 28.2 0 129.6 2.6 196.5 98.3zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8.6 15.6 1.3 18.2 2.6.6 6.4 1.3 10.2 1.3 45.4 0 102.5-30.4 139.5-71.4z" fill="#999"/>
                    </svg>
                  </div>
                  <div class="info">
                    <div class="os-name">macOS <span class="badge soon">敬请期待</span></div>
                    <div class="os-desc">.dmg 安装包</div>
                  </div>
                  <div class="arrow">→</div>
                </div>

                <div class="dl-item disabled">
                  <div class="icon">
                    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                      <circle cx="24" cy="24" r="20" fill="none" stroke="#999" stroke-width="1.5"/>
                      <path d="M24 4.5a19.5 19.5 0 0 1 13.8 5.7c-2.5-.3-5.2.4-7.5 2.3-3.8 3.1-3.3 7.3-.8 10.1 2.5 2.8 6.3 3.5 9.4 1.2 2.1-1.6 3.2-4 3.3-6.4a19.5 19.5 0 0 1 1.3 6.6c0 4.5-1.5 8.6-4.1 11.9-.5-2.8-2.3-5.5-5.3-7.2-4.2-2.4-8.6-1.2-10.9 2.2-2.3 3.4-1.5 7.9 2 10.7 1.8 1.4 4 2 6.1 1.8A19.5 19.5 0 0 1 24 43.5 19.5 19.5 0 0 1 4.5 24 19.5 19.5 0 0 1 24 4.5z" fill="#999"/>
                    </svg>
                  </div>
                  <div class="info">
                    <div class="os-name">Linux DEB <span class="badge soon">敬请期待</span></div>
                    <div class="os-desc">.deb 安装包</div>
                  </div>
                  <div class="arrow">→</div>
                </div>
              </div>
            </div>

            <script>
              const GITHUB_DL = '__EXE_URL__'
              const PROXY = 'https://v4.gh-proxy.org/'
              const cb = document.getElementById('proxy')
              const a = document.getElementById('dl-windows')
              function update() { a.href = cb.checked ? PROXY + GITHUB_DL : GITHUB_DL }
              update()
              cb.addEventListener('change', update)
            </script>
          </body>
          </html>
          HTMLEOF

          sed -i "s/__VERSION__/${VERSION}/g" index.html
          sed -i "s|__EXE_URL__|${EXE_URL}|g" index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update download page for v${VERSION}"
          git push
